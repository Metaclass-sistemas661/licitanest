<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#2563eb" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="LicitaNest" />
    <link rel="apple-touch-icon" href="/icons/icon-192x192.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LicitaNest — Cestas de Preços para Compras Públicas</title>
    <meta name="description" content="Sistema de formação e elaboração de cestas de preços para compras públicas municipais, conforme Art. 23 da Lei 14.133/2021." />
  </head>
  <body>
    <div id="root"></div>
    <script>
      // Emergency: force-update stale service workers that cache broken bundles
      // This runs before any bundled JS, so it works even when the cached app crashes
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then(function(regs) {
          regs.forEach(function(reg) {
            reg.update().catch(function() {
              // SW file fetch failed — unregister the stale worker and reload
              reg.unregister().then(function() { location.reload(); });
            });
          });
        });
      }
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
