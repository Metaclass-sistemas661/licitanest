<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Licitanest</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            background: #fff;
            color: #1e293b;
            overflow-x: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        /* ======================================== */
        /* DARK BACKGROUND - left half, diagonal    */
        /* ======================================== */
        .bg-dark {
            position: fixed;
            top: 0;
            left: 0;
            width: 50%;
            height: 100%;
            z-index: 0;
            clip-path: polygon(0 0, 100% 0, 82% 100%, 0 100%);
            background: linear-gradient(135deg, #040e2a 0%, #0d3889 40%, #1a1a2e 70%, #0d3889 100%);
            background-image:
                radial-gradient(rgba(6,182,212,0.06) 1.5px, transparent 1.5px),
                radial-gradient(circle at 30% 60%, rgba(6,182,212,0.1), transparent 50%),
                radial-gradient(circle at 80% 20%, rgba(59,130,246,0.08), transparent 50%),
                linear-gradient(135deg, #040e2a 0%, #0d3889 40%, #1a1a2e 70%, #0d3889 100%);
            background-size: 40px 40px, auto, auto, auto;
        }

        /* ======================================== */
        /* MAIN CARD - spans both halves            */
        /* ======================================== */
        .login-card {
            position: relative;
            z-index: 2;
            width: 92%;
            max-width: 1100px;
            min-height: 600px;
            background: #fff;
            border-radius: 28px;
            box-shadow: 0 40px 100px rgba(0,0,0,0.15);
            display: grid;
            grid-template-columns: 1fr 1fr;
            overflow: hidden;
        }

        /* ======================================== */
        /* LEFT COLUMN - Image with diagonal clip   */
        /* ======================================== */
        .card-left {
            position: relative;
            overflow: hidden;
            border-radius: 28px 0 0 28px;
            min-height: 600px;
            padding: 12px;
            background: #fff;
        }

        .card-left-image {
            position: absolute;
            inset: 12px;
            border-radius: 20px;
            overflow: hidden;
        }

        .card-left-image::after {
            content: '';
            position: absolute;
            top: 0;
            right: 0;
            bottom: 0;
            width: 100%;
            background: #fff;
            clip-path: polygon(100% 0, 100% 100%, 85% 100%);
            z-index: 1;
        }

        .card-left-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Placeholder until user provides image */
        .card-left-image .img-placeholder {
            width: 100%;
            height: 100%;
            background: linear-gradient(165deg, #0a1628 0%, #0d3889 35%, #040e2a 55%, #06415a 80%, #0d3889 100%);
            background-image:
                radial-gradient(circle at 40% 70%, rgba(6,182,212,0.2), transparent 50%),
                radial-gradient(circle at 70% 20%, rgba(59,130,246,0.12), transparent 40%),
                radial-gradient(rgba(255,255,255,0.04) 1px, transparent 1px),
                linear-gradient(165deg, #0a1628 0%, #0d3889 35%, #040e2a 55%, #06415a 80%, #0d3889 100%);
            background-size: auto, auto, 32px 32px, auto;
        }

        /* Header inside image */
        .card-left-header {
            position: absolute;
            top: calc(12px + 1.2rem);
            left: calc(12px + 1.2rem);
            right: calc(12px + 1.2rem);
            z-index: 3;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .clh-title {
            color: #e2e8f0;
            font-size: 0.85rem;
            font-weight: 500;
        }

        .clh-badges {
            display: flex;
            gap: 0.5rem;
        }

        .clh-badge {
            background: rgba(255,255,255,0.12);
            backdrop-filter: blur(8px);
            color: #fff;
            font-size: 0.68rem;
            padding: 0.3rem 0.65rem;
            border-radius: 20px;
            font-weight: 500;
            border: 1px solid rgba(255,255,255,0.15);
        }

        /* Footer inside image */
        .card-left-footer {
            position: absolute;
            bottom: calc(12px + 1.2rem);
            left: calc(12px + 1.2rem);
            right: calc(12px + 3rem);
            z-index: 3;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .clf-info {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .clf-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: linear-gradient(135deg, #0d3889, #06b6d4);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .clf-avatar svg { width: 20px; height: 20px; stroke: #fff; }

        .clf-name { color: #e2e8f0; font-weight: 600; font-size: 0.88rem; }
        .clf-role { color: #94a3b8; font-size: 0.72rem; }

        .clf-nav {
            display: flex;
            gap: 0.4rem;
        }

        .clf-nav button {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            border: 1px solid rgba(255,255,255,0.25);
            background: rgba(255,255,255,0.08);
            color: #e2e8f0;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
        }

        .clf-nav button:hover { background: rgba(255,255,255,0.18); }

        /* ======================================== */
        /* RIGHT COLUMN - Login Form                */
        /* ======================================== */
        .card-right {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 3rem 3.5rem;
            position: relative;
        }

        /* Brand top-right corner */
        .cr-brand {
            position: absolute;
            top: 1.5rem;
            right: 2rem;
            display: flex;
            align-items: center;
            gap: 0.45rem;
            font-family: 'Space Grotesk', sans-serif;
            font-weight: 700;
            font-size: 1rem;
            color: #0d3889;
            text-decoration: none;
        }

        .cr-brand svg { width: 20px; height: 20px; }
        .cr-brand .dot { color: #06b6d4; }

        .logo-text {
            display: flex;
            flex-direction: column;
            line-height: 1;
        }
        .logo-name {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1.35rem;
            font-weight: 700;
            letter-spacing: -0.03em;
            color: #0d3889;
        }
        .logo-sub {
            font-family: 'Inter', sans-serif;
            font-size: 0.55rem;
            font-weight: 500;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: #94a3b8;
            margin-top: 2px;
        }

        .form-box {
            width: 100%;
            max-width: 360px;
        }

        .form-greeting {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 2rem;
            font-weight: 700;
            color: #0f172a;
            margin-bottom: 0.25rem;
            font-style: italic;
        }

        .form-subtitle {
            color: #64748b;
            font-size: 0.88rem;
            margin-bottom: 2rem;
        }

        .form-group { margin-bottom: 0.9rem; }

        .form-group input {
            width: 100%;
            padding: 0.8rem 1rem;
            border: 1.5px solid #e2e8f0;
            border-radius: 10px;
            font-size: 0.86rem;
            font-family: 'Inter', sans-serif;
            color: #1e293b;
            background: #fff;
            transition: border-color 0.2s, box-shadow 0.2s;
            outline: none;
        }

        .form-group input::placeholder { color: #94a3b8; }
        .form-group input:focus { border-color: #0d3889; box-shadow: 0 0 0 3px rgba(13,56,137,0.1); }

        .pw-wrapper { position: relative; }
        .pw-wrapper input { padding-right: 2.5rem; }

        .pw-toggle {
            position: absolute; right: 0.8rem; top: 50%; transform: translateY(-50%);
            background: none; border: none; color: #94a3b8; cursor: pointer; padding: 0.2rem;
        }
        .pw-toggle:hover { color: #64748b; }

        .form-options { display: flex; justify-content: flex-end; margin-bottom: 1rem; }
        .form-options a { color: #0d3889; font-size: 0.78rem; font-weight: 500; text-decoration: none; }
        .form-options a:hover { text-decoration: underline; }

        .divider { display: flex; align-items: center; gap: 1rem; margin: 1rem 0; }
        .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: #e2e8f0; }
        .divider span { color: #94a3b8; font-size: 0.76rem; }

        .btn-google {
            width: 100%; padding: 0.75rem;
            border: 1.5px solid #e2e8f0; border-radius: 10px; background: #fff;
            font-family: 'Inter', sans-serif; font-size: 0.86rem; color: #1e293b;
            cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 0.6rem;
            transition: border-color 0.2s, background 0.2s;
        }
        .btn-google:hover { border-color: #cbd5e1; background: #f8fafc; }

        .btn-login {
            width: 100%; padding: 0.8rem; border: none; border-radius: 10px;
            background: linear-gradient(135deg, #0d3889, #06b6d4);
            color: #fff; font-family: 'Inter', sans-serif; font-size: 0.9rem; font-weight: 600;
            cursor: pointer; margin-top: 1rem;
            transition: opacity 0.2s, transform 0.1s;
            box-shadow: 0 4px 15px rgba(13,56,137,0.3);
        }
        .btn-login:hover { opacity: 0.92; }
        .btn-login:active { transform: scale(0.99); }

        .form-footer { text-align: center; color: #64748b; font-size: 0.8rem; margin-top: 1.3rem; }
        .form-footer a { color: #0d3889; font-weight: 600; text-decoration: none; }
        .form-footer a:hover { text-decoration: underline; }

        .social-row { display: flex; justify-content: center; gap: 1rem; margin-top: 1.5rem; }
        .social-row a {
            width: 34px; height: 34px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            color: #64748b; transition: color 0.2s;
        }
        .social-row a:hover { color: #0d3889; }

        /* Error */
        .error-msg {
            display: none; background: #fef2f2; border: 1px solid #fecaca; color: #dc2626;
            padding: 0.6rem 1rem; border-radius: 8px; font-size: 0.78rem;
            margin-bottom: 0.8rem; align-items: center; gap: 0.5rem;
        }
        .error-msg.show { display: flex; }

        .btn-login.loading { opacity: 0.7; pointer-events: none; }

        .spinner {
            display: inline-block; width: 16px; height: 16px;
            border: 2px solid rgba(255,255,255,0.3); border-top-color: #fff;
            border-radius: 50%; animation: spin 0.6s linear infinite; margin-right: 0.5rem;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ======================================== */
        /* RESPONSIVE                               */
        /* ======================================== */
        @media (max-width: 900px) {
            .login-card {
                grid-template-columns: 1fr;
                max-width: 480px;
                min-height: auto;
            }
            .card-left {
                min-height: 320px;
                border-radius: 28px 28px 0 0;
            }
            .card-left-image {
                clip-path: polygon(0 0, 100% 0, 100% 85%, 0 100%);
            }
            .card-right { padding: 2rem 2rem 2.5rem; }
            .cr-brand { position: static; margin-bottom: 1.5rem; justify-content: center; }
            .bg-dark { width: 100%; height: 40%; clip-path: polygon(0 0, 100% 0, 100% 80%, 0 100%); }
        }

        @media (max-width: 480px) {
            body { padding: 0; align-items: flex-start; }
            .login-card { width: 100%; border-radius: 0; min-height: 100vh; }
            .card-left { min-height: 260px; border-radius: 0; }
            .card-right { padding: 1.5rem; }
            .form-greeting { font-size: 1.6rem; }
        }
    </style>
</head>

<body>

    <!-- Dark diagonal background (left half) -->
    <div class="bg-dark"></div>

    <!-- ======================================== -->
    <!-- MAIN CARD - image left + form right      -->
    <!-- ======================================== -->
    <div class="login-card">

        <!-- LEFT: Image column -->
        <div class="card-left">
            <div class="card-left-image">
                <!-- Substitua pelo seu fundo: <img src="SUA_IMAGEM.png" alt="Background"> -->
                <div class="img-placeholder"></div>
            </div>

            <div class="card-left-header">
                <span class="clh-title">Plataforma Licitanest</span>
                <div class="clh-badges">
                    <span class="clh-badge">IN 65/2021</span>
                    <span class="clh-badge">Lei 14.133</span>
                </div>
            </div>

            <div class="card-left-footer">
                <div class="clf-info">
                    <div class="logo-text" style="color: #fff;"><span class="logo-name">licitanest</span><span class="logo-sub" style="opacity: 0.7;">by metaclass</span></div>
                </div>

            </div>
        </div>

        <!-- RIGHT: Login form column -->
        <div class="card-right">
            <a href="index.html" class="cr-brand">
                <div class="logo-text"><span class="logo-name">licitanest</span><span class="logo-sub">by metaclass</span></div>
            </a>

            <div class="form-box">
                <h1 class="form-greeting">Olá, Bem-vindo</h1>
                <p class="form-subtitle">Acesse a plataforma Licitanest</p>

                <div class="error-msg" id="errorMsg">
                    <i data-lucide="alert-circle" style="width:16px; height:16px; flex-shrink:0;"></i>
                    <span id="errorText"></span>
                </div>

                <form id="loginForm" onsubmit="handleLogin(event)">
                    <div class="form-group">
                        <input type="email" id="email" placeholder="E-mail" required autocomplete="email">
                    </div>
                    <div class="form-group">
                        <div class="pw-wrapper">
                            <input type="password" id="password" placeholder="Senha" required autocomplete="current-password" minlength="6">
                            <button type="button" class="pw-toggle" onclick="togglePassword()">
                                <i data-lucide="eye" id="eyeIcon" style="width:18px; height:18px;"></i>
                            </button>
                        </div>
                    </div>
                    <div class="form-options">
                        <a href="#">Esqueceu a senha?</a>
                    </div>

                    <button type="submit" class="btn-login" id="btnLogin">Entrar</button>
                </form>

                <p class="form-footer">
                    Não tem uma conta? <a href="contato.html">Solicitar Acesso</a>
                </p>
            </div>
        </div>

    </div>

    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        lucide.createIcons();

        function togglePassword() {
            const input = document.getElementById('password');
            const icon = document.getElementById('eyeIcon');
            if (input.type === 'password') {
                input.type = 'text';
                icon.setAttribute('data-lucide', 'eye-off');
            } else {
                input.type = 'password';
                icon.setAttribute('data-lucide', 'eye');
            }
            lucide.createIcons();
        }

        function showError(msg) {
            document.getElementById('errorText').textContent = msg;
            document.getElementById('errorMsg').classList.add('show');
        }

        function hideError() {
            document.getElementById('errorMsg').classList.remove('show');
        }

        function handleLogin(e) {
            e.preventDefault();
            hideError();
            const email = document.getElementById('email').value.trim();
            const pw = document.getElementById('password').value;
            if (!email) { showError('Informe o e-mail.'); return; }
            if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) { showError('E-mail inválido.'); return; }
            if (!pw) { showError('Informe a senha.'); return; }
            if (pw.length < 6) { showError('Senha deve ter no mínimo 6 caracteres.'); return; }

            const btn = document.getElementById('btnLogin');
            btn.classList.add('loading');
            btn.innerHTML = '<span class="spinner"></span> Entrando...';
            setTimeout(() => { window.location.href = '../index.html'; }, 1200);
        }

        function loginWithGoogle() {
            const btn = document.getElementById('btnLogin');
            btn.classList.add('loading');
            btn.innerHTML = '<span class="spinner"></span> Conectando...';
            setTimeout(() => { window.location.href = '../index.html'; }, 1200);
        }
    </script>
</body>

</html>
