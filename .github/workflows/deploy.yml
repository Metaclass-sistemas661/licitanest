name: CI/CD – Build, Test & Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "22"
  GCP_PROJECT_ID: sistema-de-gestao-16e15
  GCP_REGION: southamerica-east1
  API_IMAGE: southamerica-east1-docker.pkg.dev/sistema-de-gestao-16e15/licitanest/api

jobs:
  # ─── Lint & Type-check ──────────────────────────────────
  lint:
    name: Lint & Type-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: ESLint
        run: npm run lint

      - name: TypeScript check (frontend)
        run: npx tsc -b --noEmit

      - name: TypeScript check (API)
        run: cd api && npm ci && npx tsc --noEmit

  # ─── Unit Tests ─────────────────────────────────────────
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Run tests
        run: npm run test

  # ─── Build Frontend ────────────────────────────────────
  build:
    name: Build Frontend
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build production
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ env.GCP_PROJECT_ID }}
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist
          retention-days: 3

  # ─── Preview (PR only) ─────────────────────────────────
  preview:
    name: Preview Deploy
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'pull_request'
    permissions:
      checks: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v6

      - name: Download build artifact
        uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist

      - name: Deploy preview channel
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          projectId: ${{ env.GCP_PROJECT_ID }}
          target: licitanest
          expires: 7d

  # ─── Deploy API to Cloud Run (main only) ────────────────
  deploy-api:
    name: Deploy API (Cloud Run)
    runs-on: ubuntu-latest
    needs: [lint, test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment:
      name: production
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v3

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.GCP_REGION }}-docker.pkg.dev --quiet

      - name: Build & Push API image
        run: |
          docker build -t ${{ env.API_IMAGE }}:${{ github.sha }} \
                        -t ${{ env.API_IMAGE }}:latest \
                        ./api
          docker push ${{ env.API_IMAGE }}:${{ github.sha }}
          docker push ${{ env.API_IMAGE }}:latest

      - name: Deploy to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v3
        with:
          service: licitanest-api
          region: ${{ env.GCP_REGION }}
          image: ${{ env.API_IMAGE }}:${{ github.sha }}
          flags: >-
            --allow-unauthenticated
            --memory=512Mi
            --cpu=1
            --min-instances=0
            --max-instances=3
            --timeout=60s
            --set-env-vars=^@^NODE_ENV=production@GCP_PROJECT_ID=${{ env.GCP_PROJECT_ID }}@CORS_ORIGIN=${{ secrets.CORS_ORIGIN }}
            --add-cloudsql-instances=${{ env.GCP_PROJECT_ID }}:${{ env.GCP_REGION }}:licitanest-db

  # ─── Deploy Cloud Functions (main only) ─────────────────
  deploy-functions:
    name: Deploy Cloud Functions
    runs-on: ubuntu-latest
    needs: [lint]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment:
      name: production
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v3

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Build asaas-webhook
        run: cd cloud-functions/asaas-webhook && npm ci && npm run build

      - name: Deploy asaas-webhook
        run: |
          gcloud functions deploy asaas-webhook \
            --gen2 \
            --runtime=nodejs22 \
            --region=${{ env.GCP_REGION }} \
            --source=cloud-functions/asaas-webhook \
            --entry-point=asaasWebhook \
            --trigger-http \
            --allow-unauthenticated \
            --memory=256Mi \
            --timeout=60s

      - name: Build atualizar-indices
        run: cd cloud-functions/atualizar-indices && npm ci && npm run build

      - name: Deploy atualizar-indices
        run: |
          gcloud functions deploy atualizar-indices \
            --gen2 \
            --runtime=nodejs22 \
            --region=${{ env.GCP_REGION }} \
            --source=cloud-functions/atualizar-indices \
            --entry-point=atualizarIndices \
            --trigger-http \
            --no-allow-unauthenticated \
            --memory=256Mi \
            --timeout=120s

  # ─── Deploy Frontend to Firebase Hosting (main only) ────
  deploy-frontend:
    name: Deploy Frontend (Firebase Hosting)
    runs-on: ubuntu-latest
    needs: [build, deploy-api]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment:
      name: production
      url: https://licitanest.metaclass.com.br
    steps:
      - uses: actions/checkout@v6

      - name: Download build artifact
        uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist

      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          projectId: ${{ env.GCP_PROJECT_ID }}
          target: licitanest
          channelId: live
