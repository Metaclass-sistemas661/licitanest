name: E2E Tests

on:
  # Roda automaticamente após deploy em main, ou manualmente
  workflow_run:
    workflows: ["CI/CD – Build, Test & Deploy"]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      target_url:
        description: "URL base para testes (default: staging)"
        required: false
        default: "https://staging.licitanest.com.br"

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "22"

jobs:
  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    # Só roda se o deploy anterior teve sucesso
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        env:
          CI: true
          # URL alvo — staging por default, ou a URL fornecida manualmente
          BASE_URL: ${{ github.event.inputs.target_url || 'https://staging.licitanest.com.br' }}
          # Credenciais de teste (configurar nos secrets do GitHub)
          E2E_AUTH_EMAIL: ${{ secrets.E2E_AUTH_EMAIL }}
          E2E_AUTH_PASSWORD: ${{ secrets.E2E_AUTH_PASSWORD }}
        run: npx playwright test --reporter=github

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          retention-days: 14

      - name: Upload traces on failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-traces
          path: test-results/**/*.zip
          retention-days: 7
