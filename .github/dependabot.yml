version: 2
updates:
  # Frontend (raiz)
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 3
    labels:
      - "dependencies"
    groups:
      all-deps:
        patterns: ["*"]
        update-types: ["minor", "patch"]

  # API
  - package-ecosystem: "npm"
    directory: "/api"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 3
    labels:
      - "dependencies"
    groups:
      all-deps:
        patterns: ["*"]
        update-types: ["minor", "patch"]

  # Cloud Functions — asaas-webhook
  - package-ecosystem: "npm"
    directory: "/cloud-functions/asaas-webhook"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 2
    labels:
      - "dependencies"
    groups:
      all-deps:
        patterns: ["*"]

  # Cloud Functions — atualizar-indices
  - package-ecosystem: "npm"
    directory: "/cloud-functions/atualizar-indices"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 2
    labels:
      - "dependencies"
    groups:
      all-deps:
        patterns: ["*"]

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 2
    labels:
      - "ci"
    groups:
      all-actions:
        patterns: ["*"]
