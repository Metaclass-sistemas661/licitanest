# ═══════════════════════════════════════════════════════════════
# Cloud Build — CI/CD Pipeline para Google Cloud Run
# ═══════════════════════════════════════════════════════════════
# Trigger: push na branch main
# Destino: Cloud Run service "licitanest"
# ═══════════════════════════════════════════════════════════════

steps:
  # 0. Instalar dependências
  - name: "node:22-alpine"
    entrypoint: "npm"
    args: ["ci", "--legacy-peer-deps"]

  # 1. TypeScript type-check
  - name: "node:22-alpine"
    entrypoint: "npx"
    args: ["tsc", "--noEmit"]

  # 2. Lint
  - name: "node:22-alpine"
    entrypoint: "npm"
    args: ["run", "lint"]

  # 3. Testes unitários (frontend)
  - name: "node:22-alpine"
    entrypoint: "npm"
    args: ["run", "test"]

  # 3b. Instalar dependências e rodar testes do backend (API)
  - name: "node:22-alpine"
    entrypoint: "sh"
    args:
      - "-c"
      - "cd api && npm ci && npm run test"

  # 4. Auditoria de vulnerabilidades
  - name: "node:22-alpine"
    entrypoint: "npm"
    args: ["audit", "--audit-level=high", "--omit=dev"]
    allowFailure: true

  # 5. Build da imagem Docker
  - name: "gcr.io/cloud-builders/docker"
    args:
      - "build"
      - "-t"
      - "gcr.io/$PROJECT_ID/licitanest:$COMMIT_SHA"
      - "-t"
      - "gcr.io/$PROJECT_ID/licitanest:latest"
      - "."

  # 2. Push para Container Registry
  - name: "gcr.io/cloud-builders/docker"
    args:
      - "push"
      - "gcr.io/$PROJECT_ID/licitanest:$COMMIT_SHA"

  - name: "gcr.io/cloud-builders/docker"
    args:
      - "push"
      - "gcr.io/$PROJECT_ID/licitanest:latest"

  # 3. Deploy no Cloud Run
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    entrypoint: "gcloud"
    args:
      - "run"
      - "deploy"
      - "licitanest"
      - "--image"
      - "gcr.io/$PROJECT_ID/licitanest:$COMMIT_SHA"
      - "--region"
      - "southamerica-east1"
      - "--platform"
      - "managed"
      - "--allow-unauthenticated"
      - "--memory"
      - "256Mi"
      - "--cpu"
      - "1"
      - "--min-instances"
      - "0"
      - "--max-instances"
      - "10"
      - "--port"
      - "8080"
      - "--set-env-vars"
      - "NODE_ENV=production"

images:
  - "gcr.io/$PROJECT_ID/licitanest:$COMMIT_SHA"
  - "gcr.io/$PROJECT_ID/licitanest:latest"

options:
  logging: CLOUD_LOGGING_ONLY
