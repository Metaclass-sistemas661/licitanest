<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Background -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>
  </defs>
  <rect rx="7" ry="7" width="32" height="32" fill="url(#bg)"/>
  <!-- Scale / Balance icon -->
  <!-- Pillar -->
  <line x1="16" y1="7.5" x2="16" y2="24" stroke="#fff" stroke-width="2" stroke-linecap="round"/>
  <!-- Base -->
  <line x1="11" y1="24" x2="21" y2="24" stroke="#fff" stroke-width="2.2" stroke-linecap="round"/>
  <line x1="13.5" y1="26" x2="18.5" y2="26" stroke="#fff" stroke-width="1.5" stroke-linecap="round" opacity="0.7"/>
  <!-- Beam -->
  <line x1="7" y1="11" x2="25" y2="11" stroke="#fff" stroke-width="2" stroke-linecap="round"/>
  <!-- Left pan -->
  <line x1="7" y1="11" x2="8.5" y2="17" stroke="#fff" stroke-width="1.4" stroke-linecap="round"/>
  <line x1="7" y1="11" x2="5.5" y2="17" stroke="#fff" stroke-width="1.4" stroke-linecap="round"/>
  <path d="M5.5 17 A3.5 1.8 0 0 0 8.5 17" fill="none" stroke="#fff" stroke-width="1.4" stroke-linecap="round"/>
  <!-- Right pan -->
  <line x1="25" y1="11" x2="26.5" y2="17" stroke="#fff" stroke-width="1.4" stroke-linecap="round"/>
  <line x1="25" y1="11" x2="23.5" y2="17" stroke="#fff" stroke-width="1.4" stroke-linecap="round"/>
  <path d="M23.5 17 A3.5 1.8 0 0 0 26.5 17" fill="none" stroke="#fff" stroke-width="1.4" stroke-linecap="round"/>
  <!-- Top ornament -->
