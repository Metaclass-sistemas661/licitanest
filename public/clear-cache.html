<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LicitaNest — Limpando cache...</title>
  <style>
    body { font-family: system-ui, sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; background: #f8fafc; }
    .card { text-align: center; padding: 2rem; background: white; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,.1); max-width: 400px; }
    h1 { color: #2563eb; font-size: 1.25rem; }
    p { color: #64748b; font-size: 0.875rem; margin-top: 0.5rem; }
    .spinner { width: 40px; height: 40px; border: 4px solid #e2e8f0; border-top-color: #2563eb; border-radius: 50%; animation: spin 1s linear infinite; margin: 1rem auto; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="card">
    <div class="spinner"></div>
    <h1>Atualizando LicitaNest...</h1>
    <p>Limpando cache do navegador. Aguarde...</p>
    <p id="status"></p>
  </div>
  <script>
    var status = document.getElementById('status');
    async function clearAll() {
      try {
        // 1. Unregister all service workers
        if ('serviceWorker' in navigator) {
          var regs = await navigator.serviceWorker.getRegistrations();
          for (var r of regs) {
            await r.unregister();
          }
          status.textContent = 'Service workers removidos...';
        }
        // 2. Clear all caches
        if ('caches' in window) {
          var names = await caches.keys();
          for (var n of names) {
            await caches.delete(n);
          }
          status.textContent = 'Caches limpos...';
        }
        // 3. Redirect to login
        status.textContent = 'Redirecionando...';
        setTimeout(function() {
          window.location.href = '/login';
        }, 1000);
      } catch (e) {
        status.textContent = 'Erro: ' + e.message + '. Tente Ctrl+Shift+R.';
      }
    }
    clearAll();
  </script>
</body>
</html>
